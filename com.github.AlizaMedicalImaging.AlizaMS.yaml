app-id: com.github.AlizaMedicalImaging.AlizaMS
runtime: org.kde.Platform
sdk: org.kde.Sdk
runtime-version: '6.10'
command: alizams
rename-desktop-file: alizams.desktop
rename-appdata-file: alizams.metainfo.xml
rename-icon: alizams
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=cups
  - --device=dri
  - --filesystem=home
  - --filesystem=/media:ro
  - --filesystem=/run/media:ro
cleanup:
  - /include
  - /lib
  - '*.la'
  - '*.a'
  - /share/man
  - /share/doc
  - /share/ITK-5.4
  - /bin/itkTestDriver

modules:

  - name: ITK
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE:STRING=Release
      - -DBUILD_TESTING:BOOL=OFF
      - -DITK_BUILD_DEFAULT_MODULES:BOOL=OFF
      - -DITKGroup_Core:BOOL=ON
      - -DITKGroup_Filtering:BOOL=ON
      - -DITKGroup_Segmentation:BOOL=ON
      - -DITKGroup_Nonunit:BOOL=ON
      - -DBUILD_EXAMPLES:BOOL=OFF
      - -DITK_USE_SYSTEM_ZLIB:BOOL=ON
      - -DITK_FORBID_DOWNLOADS:BOOL=ON
      - -DITK_LEGACY_REMOVE:BOOL=ON
    sources:
      - type: archive
        url: https://github.com/InsightSoftwareConsortium/ITK/archive/refs/tags/v6.0b02.tar.gz
        sha256: 5f07c5b22067861d47d758c125008f2d2b9be46036e0a4df59951df25e85bb17
        x-checker-data:
          type: anitya
          project-id: 223473
          stable-only: true
          url-template: https://github.com/InsightSoftwareConsortium/ITK/archive/refs/tags/v$version.tar.gz

  - name: alizams
    buildsystem: cmake-ninja
    config-opts:
      - -DALIZA_CXX_STANDARD:STRING=17
      - -DCMAKE_BUILD_TYPE:STRING=RelWithDebInfo
      - -DALIZA_QT_VERSION:STRING=6
      - -DMDCM_USE_SYSTEM_ZLIB:BOOL=ON
    post-install:
      - desktop-file-edit --set-icon $FLATPAK_ID --set-key Exec --set-value 'alizams'
        /app/share/applications/alizams.desktop
    sources:
      - type: archive
        url: https://github.com/AlizaMedicalImaging/AlizaMS/archive/v1.9.12/AlizaMS-1.9.12.tar.gz
        sha256: 8ae71d8dd58145aa548465e1bafa7f1ea4cb7d96a4bb4599bdb957cf572a8678
      - type: patch
        path: fix-metainfo-id.patch
